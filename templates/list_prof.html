{% extends "base.html" %}

{% block content %}
{% if type == "ol" %}
<ol>
    {% for item in profs %}
        <li> {{ item }} </li>
    {% endfor %}
</ol>
{% elif type == "ul" %}
<ul>
    {% for item in profs %}
    <li> {{ item }} </li>
    {% endfor %}
</ul>
{% else %}
<p> Неверный формат</p>
{% endif %}

{% endblock %}
